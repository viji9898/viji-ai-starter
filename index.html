<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link id="app-favicon" rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <script>
      const favicon = document.getElementById("app-favicon");
      const isDevelopment = "%MODE%" === "development";

      if (favicon) {
        favicon.setAttribute("href", isDevelopment ? "/favicon_dev.png" : "/favicon.svg");
        favicon.setAttribute("type", isDevelopment ? "image/png" : "image/svg+xml");
      }
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>viji-ai-starter</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
